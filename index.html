<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLE Dynamisches UI Test</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Grund-Styling der App – Startzustand ist weiß/hellgrau */
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #ffffff; color: #333333; transition: background 0.5s; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; margin: 5px; }
        .box { background: rgba(255,255,255,0.9); padding: 20px; border-radius: 8px; margin: 20px auto; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); color: #222; }
        .status { color: gray; font-weight: bold; }
        
        /* Dynamischer Bereich, in den die Widgets injiziert werden */
        #widget-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        /* Dynamisches Styling für den generierten Slider */
        .generated-slider-card { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; border-radius: 6px; width: 80%; max-width: 300px; text-align: left; }
        .generated-slider-card label { font-weight: bold; display: block; margin-bottom: 5px; }
        .generated-slider-card input { width: 100%; }
    </style>
</head>
<body>

    <h1 id="app-title">Dynamisches BLE Dashboard</h1>
    
    <button id="connectBtn" onclick="connectBLE()">1. Mit ESP32 verbinden</button>
    <button id="simBtn" onclick="runByteSimulation()" style="background: #28a745;">2. Byte-Array simulieren</button>
    
    <div class="box">
        <p>Status: <span id="statusLabel" class="status">Warte auf Daten...</span></p>
        <p id="versionLabel" style="font-size: 12px; color: #777;"></p>
    </div>

    <div id="widget-container"></div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHAR_TX_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        const CHAR_RX_UUID = "62a40a5a-2270-4e31-8e99-db0067341ea2";
        let rxCharacteristic = null;

        // ==========================================================================
        // MAIN PARSER: Diese Funktion zerlegt das dynamische Byte-Array
        // ==========================================================================
        function parseLayoutByteArray(uint8Array) {
            let pointer = 0;
            const container = document.getElementById("widget-container");
            container.innerHTML = ""; // Alten Inhalt leeren

            const decoder = new TextDecoder('utf-8');

            // Solange Daten im Array vorhanden sind
            while (pointer < uint8Array.length) {
                let id = uint8Array[pointer++];
                let paramCount = uint8Array[pointer++];
                
                console.log(`Lese ID: ${id} mit ${paramCount} Parametern`);

                // Zwischenspeicher für die extrahierten Parameter dieser ID
                let extractedParams = [];

                // Alle Parameter dieser ID einsammeln
                for (let i = 0; i < paramCount; i++) {
                    let type = uint8Array[pointer++];
                    let length = uint8Array[pointer++];
                    
                    // Nutzdaten-Bytes für diesen Parameter ausschneiden
                    let dataBytes = uint8Array.subarray(pointer, pointer + length);
                    pointer += length; // Pointer weiterrücken

                    let parsedValue;
                    
                    // Datentyp-Weiche laut unserer Spezifikation
                    if (type === 0x01) { // UINT8 (Zahl 0-255)
                        parsedValue = dataBytes[0];
                    } else if (type === 0x02) { // INT8 (Zahl -128 bis 127)
                        let view = new DataView(dataBytes.buffer, dataBytes.byteOffset, dataBytes.byteLength);
                        parsedValue = view.getInt8(0);
                    } else if (type === 0x03) { // BOOL
                        parsedValue = dataBytes[0] === 0x01;
                    } else if (type === 0x04) { // COLOR (RGB 3 Bytes)
                        let r = dataBytes[0].toString(16).padStart(2, '0');
                        let g = dataBytes[1].toString(16).padStart(2, '0');
                        let b = dataBytes[2].toString(16).padStart(2, '0');
                        parsedValue = `#${r}${g}${b}`;
                    } else if (type === 0x05) { // STRING
                        parsedValue = decoder.decode(dataBytes);
                    }

                    extractedParams.push(parsedValue);
                }

                // --- AUSWERTUNG DER GEWONNENEN DATEN ---
                if (id === 0x01) {
                    // SEKTION 1: Globaler System-Header angewendet
                    // Parameter-Index: 0 = Version, 1 = Hintergrundfarbe, 2 = Titel
                    document.getElementById("versionLabel").innerText = "Protokoll-Version: " + extractedParams[0];
                    document.body.style.backgroundColor = extractedParams[1];
                    document.getElementById("app-title").innerText = extractedParams[2];
                    
                    // Textfarbe automatisch anpassen (Kontrast bei dunklem Hintergrund)
                    if(extractedParams[1] === "#333333") document.body.style.color = "#ffffff";
                    
                    document.getElementById("statusLabel").innerText = "System-Header geladen.";
                    document.getElementById("statusLabel").style.color = "green";
                } 
                else if (id === 0x02) {
                    // SEKTION 2: Ein Slider-Widget soll gebaut werden!
                    // Parameter-Index: 0 = VarName, 1 = CurrentValue, 2 = Min, 3 = Max
                    const varName = extractedParams[0];
                    const currVal = extractedParams[1];
                    const minRange = extractedParams[2];
                    const maxRange = extractedParams[3];

                    // HTML-Element für den Slider erzeugen
                    const card = document.createElement("div");
                    card.className = "generated-slider-card";
                    card.innerHTML = `
                        <label>${varName.toUpperCase()} (<span id="val-${varName}">${currVal}</span>)</label>
                        <input type="range" min="${minRange}" max="${maxRange}" value="${currVal}" id="input-${varName}">
                    `;
                    container.appendChild(card);

                    // Event-Listener: Wenn der Slider bedient wird, senden wir Daten zurück
                    card.querySelector("input").addEventListener("input", (e) => {
                        document.getElementById(`val-${varName}`).innerText = e.target.value;
                        // Hier rufen wir später die BLE-Sendefunktion auf!
                        console.log(`Sende an ESP: ${varName} = ${e.target.value}`);
                    });
                }
            }
        }

        // ==========================================================================
        // 2. SIMULATIONS-TEST (Erzeugt exakt unser besprochenes Byte-Array)
        // ==========================================================================
        function runByteSimulation() {
			alert("Button wurde gedrückt!"); // <-- DIESE ZEILE ZUM TESTEN EINFÜGEN
            // Unser vordefiniertes 39-Byte langes Test-Array:
            // Sektion 1 (ID 1, 3 Params): Version (1), Color (#333333), Title ("Roboter-Panel")
            // Sektion 2 (ID 2, 4 Params): Name ("speed"), Val (0), Min (0), Max (180)
            const testBytes = new Uint8Array([
                // --- SYSTEM HEADER (ID 1) ---
                0x01, // ID = 1
                0x03, // 3 Parameter folgen
                0x01, 0x01, 0x01, // Param 1: Type UINT8 (1), Length (1), Wert (1)
                0x04, 0x03, 0x33, 0x33, 0x33, // Param 2: Type COLOR (4), Length (3), Wert (#333333)
                0x05, 0x0d, 0x52, 0x6f, 0x62, 0x6f, 0x74, 0x65, 0x72, 0x2d, 0x50, 0x61, 0x6e, 0x65, 0x6c, // Param 3: Type STRING (5), Length 13, "Roboter-Panel"

                // --- SLIDER WIDGET (ID 2) ---
                0x02, // ID = 2 (Slider)
                0x04, // 4 Parameter folgen
                0x05, 0x05, 0x73, 0x70, 0x65, 0x65, 0x64, // Param 1: Type STRING (5), Length 5, "speed"
                0x01, 0x01, 0x00, // Param 2: Type UINT8 (1), Length 1, Wert (0)
                0x01, 0x01, 0x00, // Param 3: Type UINT8 (1), Length 1, Wert (0)
                0x01, 0x01, 0xB4  // Param 4: Type UINT8 (1), Length 1, Wert (180 / Hex B4)
            ]);

            parseLayoutByteArray(testBytes);
        }

        // ==========================================================================
        // 3. ECHTE BLUETOOTH INTEGRATION
        // ==========================================================================
        async function connectBLE() {
            const statusLabel = document.getElementById("statusLabel");
            statusLabel.innerText = "Suche ESP32...";
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                statusLabel.innerText = "Verbinde...";
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                
                rxCharacteristic = await service.getCharacteristic(CHAR_RX_UUID);
                const txChar = await service.getCharacteristic(CHAR_TX_UUID);
                
                await txChar.startNotifications();
                txChar.addEventListener('characteristicvaluechanged', (event) => {
                    // ECHTE DATEN VOM ESP32 EMPFANGEN:
                    // Wir holen uns den Byte-Puffer direkt als Uint8Array
                    let rawBuffer = new Uint8Array(event.target.value.buffer);
                    parseLayoutByteArray(rawBuffer);
                });

                statusLabel.innerText = "Verbunden! Warte auf ESP-Bytes...";
                document.getElementById("connectBtn").style.display = "none";
            } catch (error) {
                console.error(error);
                statusLabel.innerText = "Fehler: " + error;
            }
        }
    </script>
</body>
</html>
