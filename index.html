<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLE Ping-Pong Test</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        .box { background: white; padding: 20px; border-radius: 8px; margin: 20px auto; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status { color: gray; font-weight: bold; }
        .wert { font-size: 32px; color: #28a745; margin: 10px 0; }
    </style>
</head>
<body>

    <h1>Machbarkeitsstudie BLE</h1>
    
    <button id="connectBtn" onclick="connectBLE()">Mit ESP32 verbinden</button>
    
    <div class="box">
        <p>Status: <span id="statusLabel" class="status">Nicht verbunden</span></p>
        <hr>
        <p>Empfangen vom ESP32 (Original):</p>
        <div id="rxLabel" class="wert">0</div>
        <p>Zurückgesendet an ESP32 (x 2):</p>
        <div id="txLabel" class="wert" style="color: #dc3545;">0</div>
    </div>

    <script>
        // Die exakt gleichen UUIDs wie im ESP32 Code
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHAR_TX_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8"; // Vom ESP gesendet
        const CHAR_RX_UUID = "62a40a5a-2270-4e31-8e99-db0067341ea2"; // Vom Handy gesendet

        let rxCharacteristic = null;

        async function connectBLE() {
            const statusLabel = document.getElementById("statusLabel");
            statusLabel.innerText = "Suche Geräte...";
            
            try {
                // 1. Nach dem ESP32-C3 suchen
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                statusLabel.innerText = "Verbinde mit Server...";
                const server = await device.gatt.connect();

                statusLabel.innerText = "Lade Service...";
                const service = await server.getPrimaryService(SERVICE_UUID);

                statusLabel.innerText = "Suche Kanäle...";
                // Kanal zum Schreiben (Handy -> ESP) holen
                rxCharacteristic = await service.getCharacteristic(CHAR_RX_UUID);
                
                // Kanal zum Lesen (ESP -> Handy) holen
                const txChar = await service.getCharacteristic(CHAR_TX_UUID);
                
                // Benachrichtigungen (Notify) vom ESP aktivieren
                await txChar.startNotifications();
                txChar.addEventListener('characteristicvaluechanged', handleIncomingData);

                statusLabel.innerText = "Verbunden & Aktiv!";
                statusLabel.style.color = "green";
                document.getElementById("connectBtn").style.display = "none";

            } catch (error) {
                console.error(error);
                statusLabel.innerText = "Fehler: " + error;
                statusLabel.style.color = "red";
            }
        }

        // Verarbeitung der Daten, die vom ESP32 reinkommen
        function handleIncomingData(event) {
            // Byte-Array in Text umwandeln
            const decoder = new TextDecoder('utf-8');
            const rawText = decoder.decode(event.target.value);
            const originalValue = parseInt(rawText) || 0;

            // UI aktualisieren (Originalwert anzeigen)
            document.getElementById("rxLabel").innerText = originalValue;

            // MATHEMATIK: Wert verdoppeln
            const multipliedValue = originalValue * 2;
            document.getElementById("txLabel").innerText = multipliedValue;

            // WERT ZURÜCKSCHICKEN (Handy -> ESP32)
            sendToESP32(String(multipliedValue));
        }

        // Funktion zum Senden von Text an den ESP32
        async function sendToESP32(text) {
            if (!rxCharacteristic) return;
            const encoder = new TextEncoder('utf-8');
            const data = encoder.encode(text);
            
            try {
                // Wert ohne Antwort-Verzögerung an den ESP32 jagen
                await rxCharacteristic.writeValueWithoutResponse(data);
            } catch (error) {
                console.error("Sende-Fehler:", error);
            }
        }
    </script>
</body>
</html>
